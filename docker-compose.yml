version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eval-backend
    restart: unless-stopped
    environment:
      - GIN_MODE=release
      - DB_PATH=/app/data/eval.db
      - UPLOAD_PATH=/app/uploads
      - JWT_SECRET=${JWT_SECRET:-super-secret-key-change-in-production}
      - PORT=8080
      - DEEPSEEK_API_KEY=${DEEPSEEK_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
    volumes:
      - backend-data:/app/data
      - backend-uploads:/app/uploads
    networks:
      - eval-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 3s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=/api
    container_name: eval-frontend
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - eval-network

volumes:
  backend-data:
    driver: local
  backend-uploads:
    driver: local

networks:
  eval-network:
    driver: bridge
